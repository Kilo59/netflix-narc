name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      # This permission is required for trusted publishing
      id-token: write
      # This permission is required to read the repository content
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish package
        run: |
          # Capture stderr to a file so we can check for specific error strings
          uv publish 2> publish_err.log || {
            exit_code=$?
            # Check for common "version already exists" markers in the output
            if grep -qi "already exists" publish_err.log; then
              echo "::warning title=Netflix Narc Publish::Version already exists on PyPI. Skipping upload."
            else
              cat publish_err.log
              exit $exit_code
            fi
          }

  github-release:
    name: Create GitHub Release
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
